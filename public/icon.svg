<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="helixGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f03c8e"/>
      <stop offset="50%" stop-color="#9b55d4"/>
      <stop offset="100%" stop-color="#4dbfaa"/>
    </linearGradient>
    <linearGradient id="helixGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f03c8e" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#9b55d4" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#4dbfaa" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f9f9f9"/>
      <stop offset="100%" stop-color="#f9f9f9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="13" fill="#0f1a14"/>

  <!-- DNA strand 1 (front) -->
  <path d="M22 6 C22 18 42 18 42 32 C42 46 22 46 22 58"
        fill="none" stroke="url(#helixGrad1)" stroke-width="3" stroke-linecap="round"/>

  <!-- DNA strand 2 (back, faded) -->
  <path d="M42 6 C42 18 22 18 22 32 C22 46 42 46 42 58"
        fill="none" stroke="url(#helixGrad2)" stroke-width="3" stroke-linecap="round"/>

  <!-- Rungs -->
  <line x1="22" y1="6"  x2="42" y2="6"  stroke="#f03c8e" stroke-width="2.2" stroke-linecap="round" opacity="0.85"/>
  <line x1="38" y1="13" x2="26" y2="13" stroke="#d044ae" stroke-width="2"   stroke-linecap="round" opacity="0.6"/>
  <line x1="22" y1="20" x2="42" y2="20" stroke="#9b55d4" stroke-width="2.2" stroke-linecap="round" opacity="0.85"/>
  <line x1="38" y1="26" x2="26" y2="26" stroke="#7a60c8" stroke-width="2"   stroke-linecap="round" opacity="0.6"/>
  <line x1="22" y1="32" x2="42" y2="32" stroke="#6a6ac0" stroke-width="2.2" stroke-linecap="round" opacity="0.85"/>
  <line x1="26" y1="38" x2="38" y2="38" stroke="#4dbfaa" stroke-width="2"   stroke-linecap="round" opacity="0.6"/>
  <line x1="22" y1="44" x2="42" y2="44" stroke="#4dbfaa" stroke-width="2.2" stroke-linecap="round" opacity="0.85"/>
  <line x1="26" y1="51" x2="38" y2="51" stroke="#4dbfaa" stroke-width="2"   stroke-linecap="round" opacity="0.6"/>
  <line x1="22" y1="58" x2="42" y2="58" stroke="#4dbfaa" stroke-width="2.2" stroke-linecap="round" opacity="0.85"/>

  <!-- PK letters -->
  <text x="32" y="37" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="700" font-size="15"
        fill="#ffffff" opacity="0.95">PK</text>
</svg>
